name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Testes Unitários (Surefire, sem Docker)
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Testes Unitários
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Permitir execução do Maven Wrapper
        run: chmod +x mvnw

      - name: Rodar testes unitários
        run: ./mvnw -B -ntp test

      - name: Upload relatório Surefire
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Testes de Integração + Cobertura JaCoCo
  # Roda `verify` para acionar Failsafe (*IT.java) e JaCoCo
  # Depende dos testes unitários passarem primeiro
  # ─────────────────────────────────────────────────────────────
  coverage:
    name: Cobertura JaCoCo
    runs-on: ubuntu-latest
    needs: unit-tests

    # Permissão para postar comentário de cobertura no PR
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Permitir execução do Maven Wrapper
        run: chmod +x mvnw

      - name: Rodar verify (ITs + JaCoCo)
        # -Dsurefire.skip=true evita reexecutar os unitários já rodados na job anterior
        run: ./mvnw -B -ntp verify #-Dsurefire.skip=true

      - name: Upload relatório JaCoCo (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Upload relatório Failsafe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: target/failsafe-reports/

      - name: Extrair % de cobertura e comentar no PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Lê o XML gerado pelo JaCoCo
            const xml = fs.readFileSync('target/site/jacoco/jacoco.xml', 'utf8');

            // Extrai contadores globais do bundle
            const missedLines  = [...xml.matchAll(/<counter type="LINE" missed="(\d+)"/g)].reduce((a, m) => a + +m[1], 0);
            const coveredLines = [...xml.matchAll(/<counter type="LINE" missed="\d+" covered="(\d+)"/g)].reduce((a, m) => a + +m[1], 0);
            const missedBranch  = [...xml.matchAll(/<counter type="BRANCH" missed="(\d+)"/g)].reduce((a, m) => a + +m[1], 0);
            const coveredBranch = [...xml.matchAll(/<counter type="BRANCH" missed="\d+" covered="(\d+)"/g)].reduce((a, m) => a + +m[1], 0);

            const pctLine   = coveredLines + missedLines   > 0 ? (coveredLines   / (coveredLines   + missedLines)   * 100).toFixed(1) : 'N/A';
            const pctBranch = coveredBranch + missedBranch > 0 ? (coveredBranch / (coveredBranch + missedBranch) * 100).toFixed(1) : 'N/A';

            const icon = pctLine >= 80 ? '✅' : '⚠️';

            const body = [
              `## ${icon} Cobertura de Código — JaCoCo`,
              '',
              `| Métrica   | Cobertas | Perdidas | **Cobertura** |`,
              `|-----------|----------|----------|---------------|`,
              `| Linhas    | ${coveredLines}      | ${missedLines}      | **${pctLine}%**      |`,
              `| Branches  | ${coveredBranch}      | ${missedBranch}      | **${pctBranch}%**      |`,
              '',
              `> Gate mínimo configurado: **80% de linhas**`,
              `> Relatório completo disponível nos artifacts desta execução.`,
            ].join('\n');

            // Apaga comentários antigos de cobertura para não acumular
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const c of comments) {
              if (c.body.includes('Cobertura de Código — JaCoCo')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
