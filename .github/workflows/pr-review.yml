name: AI PR Review

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB — Revisão e aprovação de PR com Gemini 1.5 Flash (gratuito)
  #
  # PRÉ-REQUISITO:
  #   1. Acesse https://aistudio.google.com e gere uma API key
  #   2. Adicione o secret no repositório:
  #      Settings → Secrets → Actions → New repository secret
  #      Nome:  GEMINI_API_KEY
  #      Valor: sua chave do Google AI Studio
  # ─────────────────────────────────────────────────────────────
  ai-review:
    name: Revisão de PR com Gemini
    runs-on: ubuntu-latest

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Obter número do PR e contexto
        id: pr-info
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const headSha = context.payload.workflow_run.head_sha;

            const runs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              sort:  'updated',
              direction: 'desc',
              per_page: 10,
            });

            const pr = runs.data.find(p => p.head.sha === headSha);

            if (!pr) {
              core.setFailed('PR não encontrado para este commit. Pulando revisão.');
              return;
            }

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('base_sha',  pr.base.sha);
            core.setOutput('head_sha',  pr.head.sha);
            core.setOutput('pr_title',  pr.title);
            core.setOutput('pr_body',   pr.body || '(sem descrição)');

      - name: Gerar diff do PR
        run: |
          BASE=${{ steps.pr-info.outputs.base_sha }}
          HEAD=${{ steps.pr-info.outputs.head_sha }}

          git diff "$BASE" "$HEAD" -- '*.java' '*.yml' '*.xml' \
            | head -n 400 > /tmp/pr_diff.txt

          echo "Linhas no diff: $(wc -l < /tmp/pr_diff.txt)"

      - name: Chamar Gemini para revisar o PR
        id: gemini-review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PR_TITLE="${{ steps.pr-info.outputs.pr_title }}"
          PR_BODY="${{ steps.pr-info.outputs.pr_body }}"
          DIFF=$(cat /tmp/pr_diff.txt)

          PROMPT="Você é um revisor de código sênior para um projeto Java Spring Boot chamado 'biblioteca-pessoal' — um gerenciador de biblioteca pessoal.

          Ele usa: Spring Boot 3, MongoDB, Testcontainers, WireMock (VCR), Spring Security, Thymeleaf e JaCoCo.
          O projeto NÃO usa Mockito por decisão arquitetural — todos os testes usam infraestrutura real via Testcontainers ou WireMock.

          Analise o PR abaixo e retorne APENAS um JSON válido neste formato exato, sem markdown, sem blocos de código, sem explicações adicionais:
          {\"decision\": \"APPROVE\" ou \"REQUEST_CHANGES\", \"summary\": \"resumo em 2-3 frases\", \"issues\": [\"problema 1\", \"problema 2\"], \"praise\": [\"ponto positivo 1\"]}

          Critérios para APPROVE:
          - Testes presentes e coerentes com o padrão do projeto (*Test.java ou *IT.java)
          - Sem uso indevido de Mockito
          - Sem credenciais ou dados sensíveis hardcoded
          - Código legível e alinhado com boas práticas Spring Boot

          Critérios para REQUEST_CHANGES:
          - Ausência de testes para lógica de negócio nova
          - Uso de Mockito (violação arquitetural do projeto)
          - Credenciais hardcoded
          - Problemas graves de segurança ou lógica

          Título do PR: $PR_TITLE
          Descrição: $PR_BODY

          Diff (até 400 linhas):
          $DIFF"

          PAYLOAD=$(jq -n --arg prompt "$PROMPT" '{
            contents: [{
              parts: [{ text: $prompt }]
            }],
            generationConfig: {
              temperature: 0.2,
              maxOutputTokens: 1024
            }
          }')

          RESPONSE=$(curl -s \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY")

          GEMINI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$GEMINI_TEXT" ]; then
            echo "Erro na resposta da API Gemini:"
            echo "$RESPONSE"
            exit 1
          fi

          # Remove possíveis blocos markdown que o Gemini às vezes inclui
          CLEAN_JSON=$(echo "$GEMINI_TEXT" | sed 's/```json//g' | sed 's/```//g' | tr -d '\n' | xargs)

          echo "$CLEAN_JSON" > /tmp/gemini_response.json

          DECISION=$(echo "$CLEAN_JSON" | jq -r '.decision')
          SUMMARY=$(echo "$CLEAN_JSON"  | jq -r '.summary')

          echo "decision=$DECISION" >> $GITHUB_OUTPUT
          echo "summary=$SUMMARY"   >> $GITHUB_OUTPUT

          echo "Gemini decidiu: $DECISION"
          echo "Resumo: $SUMMARY"

      - name: Postar revisão no PR
        uses: actions/github-script@v7
        env:
          DECISION: ${{ steps.gemini-review.outputs.decision }}
          SUMMARY:  ${{ steps.gemini-review.outputs.summary }}
        with:
          script: |
            const fs = require('fs');
            const prNumber = parseInt('${{ steps.pr-info.outputs.pr_number }}');
            const decision = process.env.DECISION;
            const summary  = process.env.SUMMARY;

            let geminiData = {};
            try {
              geminiData = JSON.parse(fs.readFileSync('/tmp/gemini_response.json', 'utf8'));
            } catch (e) {
              console.log('Não foi possível ler resposta detalhada do Gemini.');
            }

            const issues  = (geminiData.issues || []).map(i => `- ⚠️ ${i}`).join('\n') || '- Nenhum problema encontrado';
            const praises = (geminiData.praise  || []).map(p => `- ✅ ${p}`).join('\n') || '- Nenhum';

            const icon = decision === 'APPROVE' ? '🤖✅' : '🤖🔁';

            const body = [
              `## ${icon} Revisão Automática — Gemini 1.5 Flash`,
              '',
              `**Decisão:** \`${decision}\``,
              '',
              `**Resumo:** ${summary}`,
              '',
              `### ✅ Pontos positivos`,
              praises,
              '',
              `### ⚠️ Problemas encontrados`,
              issues,
              '',
              `---`,
              `*Revisão gerada automaticamente pelo Gemini 1.5 Flash. Sempre valide com revisão humana em mudanças críticas.*`,
            ].join('\n');

            // Descarta reviews anteriores do bot para não acumular
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: prNumber,
            });

            for (const r of reviews) {
              if (r.body && r.body.includes('Revisão Automática — Gemini')) {
                await github.rest.pulls.dismissReview({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  pull_number: prNumber,
                  review_id: r.id,
                  message: 'Substituído por revisão mais recente.',
                });
              }
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: prNumber,
              event: decision === 'APPROVE' ? 'APPROVE' : 'REQUEST_CHANGES',
              body,
            });

            console.log(`PR #${prNumber} — ${decision}`);